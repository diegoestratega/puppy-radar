name: Scrape 954 Puppies

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install playwright beautifulsoup4 lxml

      - name: Install Chromium
        run: playwright install chromium --with-deps

      - name: Run scraper
        run: python scripts/scrape_puppies.py

      - name: Commit cache file
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add static/fp_cache.json
          git diff --staged --quiet || git commit -m "chore: update puppy cache"
          git push