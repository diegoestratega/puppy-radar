<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Puppy Radar</title>
  <style>
    :root {
      --bg: #f6f7fb;
      --card: #ffffff;
      --text: #1d2433;
      --muted: #6b7280;
      --border: #e5e7eb;
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --success: #15803d;
      --danger: #dc2626;
      --warning: #d97706;
      --chip: #eef2ff;
      --shadow: 0 10px 25px rgba(0, 0, 0, 0.06);
      --radius: 16px;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.45;
    }

    .app {
      max-width: 1400px;
      margin: 0 auto;
      padding: 20px;
    }

    .topbar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 18px;
    }

    .brand h1 {
      margin: 0;
      font-size: 30px;
      line-height: 1.1;
    }

    .brand p {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 14px;
    }

    .top-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }

    .btn, button, select, input, textarea {
      font: inherit;
    }

    .btn {
      border: 1px solid var(--border);
      background: #fff;
      color: var(--text);
      padding: 10px 14px;
      border-radius: 12px;
      cursor: pointer;
      transition: 0.18s ease;
    }

    .btn:hover {
      transform: translateY(-1px);
      box-shadow: var(--shadow);
    }

    .btn-primary {
      background: var(--primary);
      color: #fff;
      border-color: var(--primary);
    }

    .btn-primary:hover {
      background: var(--primary-dark);
      border-color: var(--primary-dark);
    }

    .btn-danger {
      background: var(--danger);
      color: #fff;
      border-color: var(--danger);
    }

    .btn-success {
      background: var(--success);
      color: #fff;
      border-color: var(--success);
    }

    .panel {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 16px;
      margin-bottom: 16px;
    }

    .toolbar {
      display: grid;
      grid-template-columns: 1.2fr 1fr 1fr;
      gap: 12px;
      align-items: end;
    }

    @media (max-width: 980px) {
      .toolbar {
        grid-template-columns: 1fr;
      }
    }

    .field label {
      display: block;
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .field input,
    .field select {
      width: 100%;
      border: 1px solid var(--border);
      background: #fff;
      border-radius: 12px;
      padding: 10px 12px;
      outline: none;
    }

    .field input:focus,
    .field select:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
    }

    .view-tabs,
    .breed-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .view-tabs {
      margin-bottom: 12px;
    }

    .tab-btn,
    .breed-btn {
      border: 1px solid var(--border);
      background: #fff;
      color: var(--text);
      padding: 9px 12px;
      border-radius: 999px;
      cursor: pointer;
      transition: 0.18s ease;
      font-size: 14px;
    }

    .tab-btn.active,
    .breed-btn.active {
      background: var(--primary);
      border-color: var(--primary);
      color: #fff;
    }

    .stats {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      justify-content: space-between;
      margin-top: 12px;
    }

    .stats-left {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .chip {
      background: var(--chip);
      color: #3730a3;
      border-radius: 999px;
      padding: 7px 10px;
      font-size: 13px;
      border: 1px solid #c7d2fe;
    }

    .muted {
      color: var(--muted);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(310px, 1fr));
      gap: 16px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      overflow: hidden;
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      min-height: 100%;
    }

    .card-media {
      position: relative;
      background: #f3f4f6;
      aspect-ratio: 4 / 3;
      overflow: hidden;
    }

    .card-media img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .card-badges {
      position: absolute;
      top: 10px;
      left: 10px;
      right: 10px;
      display: flex;
      justify-content: space-between;
      pointer-events: none;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(255,255,255,0.92);
      color: var(--text);
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 12px;
      border: 1px solid rgba(229,231,235,0.9);
      backdrop-filter: blur(6px);
      pointer-events: auto;
    }

    .badge.favorite {
      background: rgba(21,128,61,0.95);
      color: #fff;
      border-color: rgba(21,128,61,1);
    }

    .badge.hidden {
      background: rgba(220,38,38,0.95);
      color: #fff;
      border-color: rgba(220,38,38,1);
    }

    .card-body {
      padding: 14px 14px 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      flex: 1;
    }

    .title-row {
      display: flex;
      align-items: start;
      justify-content: space-between;
      gap: 12px;
    }

    .title-row h3 {
      margin: 0;
      font-size: 22px;
      line-height: 1.1;
    }

    .price {
      font-weight: 700;
      color: var(--success);
      white-space: nowrap;
      font-size: 16px;
    }

    .breed-line {
      font-size: 15px;
      font-weight: 600;
    }

    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .meta span {
      font-size: 13px;
      color: var(--muted);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 6px 9px;
      background: #fff;
    }

    .note-box {
      background: #fafafa;
      border: 1px dashed var(--border);
      border-radius: 12px;
      padding: 10px 12px;
      font-size: 14px;
      color: var(--muted);
      min-height: 44px;
    }

    .card-actions {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin-top: auto;
    }

    .card-actions .btn {
      padding: 10px 8px;
      text-align: center;
      font-size: 13px;
    }

    @media (max-width: 520px) {
      .card-actions {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    .empty {
      text-align: center;
      padding: 50px 20px;
      color: var(--muted);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .empty h3 {
      color: var(--text);
      margin: 0 0 8px;
    }

    .loading-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(310px, 1fr));
      gap: 16px;
    }

    .skeleton-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      overflow: hidden;
      box-shadow: var(--shadow);
    }

    .skeleton-img,
    .skeleton-line {
      background: linear-gradient(90deg, #eef1f5 25%, #e2e8f0 50%, #eef1f5 75%);
      background-size: 200% 100%;
      animation: shimmer 1.3s infinite linear;
    }

    .skeleton-img {
      aspect-ratio: 4 / 3;
    }

    .skeleton-body {
      padding: 14px;
    }

    .skeleton-line {
      height: 14px;
      border-radius: 999px;
      margin-bottom: 10px;
    }

    .w-70 { width: 70%; }
    .w-50 { width: 50%; }
    .w-90 { width: 90%; }

    @keyframes shimmer {
      from { background-position: 200% 0; }
      to   { background-position: -200% 0; }
    }

    .footer-note {
      margin-top: 18px;
      font-size: 13px;
      color: var(--muted);
      text-align: center;
    }

    a.link-reset {
      color: inherit;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <div class="brand">
        <h1>Puppy Radar</h1>
        <p>All puppies load once. Breed buttons filter instantly. Abby's Saves stays on this browser even after redeploys.</p>
      </div>
      <div class="top-actions">
        <button id="refreshBtn" class="btn btn-primary">Refresh puppies</button>
      </div>
    </div>

    <div class="panel">
      <div class="view-tabs">
        <button class="tab-btn active" data-view="all">All Puppies</button>
        <button class="tab-btn" data-view="favorite">Abby's Saves</button>
        <button class="tab-btn" data-view="hidden">Hidden</button>
      </div>

      <div class="toolbar">
        <div class="field">
          <label for="searchInput">Search by name or breed</label>
          <input id="searchInput" type="text" placeholder="Maltese, Abby, Shih Tzu..." />
        </div>

        <div class="field">
          <label for="sortSelect">Sort</label>
          <select id="sortSelect">
            <option value="newest">Newest</option>
            <option value="name">Name A-Z</option>
            <option value="breed">Breed A-Z</option>
            <option value="price_low">Price low-high</option>
            <option value="price_high">Price high-low</option>
            <option value="source">Source</option>
          </select>
        </div>

        <div class="field">
          <label for="sourceSelect">Source</label>
          <select id="sourceSelect">
            <option value="All">All sources</option>
            <option value="954 Puppies">954 Puppies</option>
            <option value="RescueGroups">RescueGroups</option>
            <option value="Miami-Dade Animal Services">Miami-Dade Animal Services</option>
          </select>
        </div>
      </div>

      <div style="margin-top: 14px;">
        <div id="breedRow" class="breed-row"></div>
      </div>

      <div class="stats">
        <div class="stats-left">
          <span id="resultCount" class="chip">0 results</span>
          <span id="viewLabel" class="chip">View: All Puppies</span>
          <span id="cacheStatus" class="muted"></span>
        </div>
        <div class="muted" id="statusMessage"></div>
      </div>
    </div>

    <div id="content"></div>

    <div class="footer-note">
      Favorites, hidden picks, and notes are saved on this browser and also try to sync to the server when possible.
    </div>
  </div>

  <script>
    const LS_KEY = 'puppy_radar_state_v2';
    const UI_KEY = 'puppy_radar_ui_v2';

    let ALL_PUPPIES = [];
    let FILTERED_PUPPIES = [];
    let CURRENT_VIEW = 'all';
    let CURRENT_BREED = 'All';
    let BREEDS = ['All'];

    const contentEl       = document.getElementById('content');
    const breedRowEl      = document.getElementById('breedRow');
    const resultCountEl   = document.getElementById('resultCount');
    const viewLabelEl     = document.getElementById('viewLabel');
    const cacheStatusEl   = document.getElementById('cacheStatus');
    const statusMessageEl = document.getElementById('statusMessage');

    const searchInput = document.getElementById('searchInput');
    const sortSelect  = document.getElementById('sortSelect');
    const sourceSelect = document.getElementById('sourceSelect');
    const refreshBtn  = document.getElementById('refreshBtn');

    function loadLocalState() {
      try {
        return JSON.parse(localStorage.getItem(LS_KEY) || '{}');
      } catch {
        return {};
      }
    }

    function saveLocalState(state) {
      localStorage.setItem(LS_KEY, JSON.stringify(state));
    }

    function loadUIState() {
      try {
        return JSON.parse(localStorage.getItem(UI_KEY) || '{}');
      } catch {
        return {};
      }
    }

    function saveUIState() {
      localStorage.setItem(UI_KEY, JSON.stringify({
        currentView: CURRENT_VIEW,
        currentBreed: CURRENT_BREED,
        search: searchInput.value || '',
        sort: sortSelect.value || 'newest',
        source: sourceSelect.value || 'All'
      }));
    }

    function getItemState(id) {
      return loadLocalState()[id] || { status: 'new', note: '', updated_at: null };
    }

    async function syncStateToServer(id, status, note = '') {
      try {
        await fetch('/api/state', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            listing_id: id,
            status,
            note
          })
        });
      } catch (e) {
        // silent — local copy is still kept
      }
    }

    function compareDates(a, b) {
      const da = a ? new Date(a).getTime() : 0;
      const db = b ? new Date(b).getTime() : 0;
      return da - db;
    }

    function mergeStates(serverState, localState) {
      const merged = { ...serverState };

      for (const [id, localValue] of Object.entries(localState)) {
        if (!merged[id]) {
          merged[id] = localValue;
          continue;
        }
        const serverValue = merged[id];
        if (compareDates(localValue.updated_at, serverValue.updated_at) >= 0) {
          merged[id] = localValue;
        }
      }

      return merged;
    }

    function saveToState(id, status, note = '') {
      const state = loadLocalState();

      if (status === 'none') {
        delete state[id];
      } else {
        state[id] = {
          status,
          note,
          updated_at: new Date().toISOString()
        };
      }

      saveLocalState(state);

      const outgoingStatus = status === 'none' ? 'none' : status;
      syncStateToServer(id, outgoingStatus, note);

      applyFilters();
    }

    function priceToNumber(price) {
      if (!price) return null;
      const n = Number(String(price).replace(/[^0-9.]/g, ''));
      return Number.isFinite(n) ? n : null;
    }

    function restoreUIState() {
      const ui = loadUIState();
      if (ui.currentView) CURRENT_VIEW = ui.currentView;
      if (ui.currentBreed) CURRENT_BREED = ui.currentBreed;
      if (ui.search) searchInput.value = ui.search;
      if (ui.sort) sortSelect.value = ui.sort;
      if (ui.source) sourceSelect.value = ui.source;
    }

    function showLoading() {
      contentEl.innerHTML = `
        <div class="loading-grid">
          ${Array.from({ length: 8 }).map(() => `
            <div class="skeleton-card">
              <div class="skeleton-img"></div>
              <div class="skeleton-body">
                <div class="skeleton-line w-70"></div>
                <div class="skeleton-line w-50"></div>
                <div class="skeleton-line w-90"></div>
              </div>
            </div>
          `).join('')}
        </div>
      `;
    }

    function showEmpty(title, text) {
      contentEl.innerHTML = `
        <div class="empty">
          <h3>${title}</h3>
          <p>${text}</p>
        </div>
      `;
    }

    function renderBreedButtons() {
      breedRowEl.innerHTML = BREEDS.map(breed => `
        <button class="breed-btn ${breed === CURRENT_BREED ? 'active' : ''}" data-breed="${escapeHtml(breed)}">
          ${escapeHtml(breed)}
        </button>
      `).join('');

      breedRowEl.querySelectorAll('.breed-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          CURRENT_BREED = btn.dataset.breed;
          saveUIState();
          renderBreedButtons();
          applyFilters();
        });
      });
    }

    function renderViewTabs() {
      document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.view === CURRENT_VIEW);
      });

      if (CURRENT_VIEW === 'all') viewLabelEl.textContent = 'View: All Puppies';
      if (CURRENT_VIEW === 'favorite') viewLabelEl.textContent = "View: Abby's Saves";
      if (CURRENT_VIEW === 'hidden') viewLabelEl.textContent = 'View: Hidden';
    }

    function applyFilters() {
      const state = loadLocalState();
      const q = (searchInput.value || '').trim().toLowerCase();
      const source = sourceSelect.value || 'All';
      const sort = sortSelect.value || 'newest';

      let list = ALL_PUPPIES.map(item => {
        const s = state[item.id] || {};
        return {
          ...item,
          status: s.status || 'new',
          note: s.note || '',
          updated_at: s.updated_at || null
        };
      });

      if (CURRENT_VIEW === 'all') {
        list = list.filter(item => item.status !== 'hidden');
      } else if (CURRENT_VIEW === 'favorite') {
        list = list.filter(item => item.status === 'favorite');
      } else if (CURRENT_VIEW === 'hidden') {
        list = list.filter(item => item.status === 'hidden');
      }

      if (CURRENT_BREED !== 'All') {
        const b = CURRENT_BREED.toLowerCase();
        list = list.filter(item =>
          (item.breed || '').toLowerCase().includes(b) ||
          (item.breed_secondary || '').toLowerCase().includes(b) ||
          (item.name || '').toLowerCase().includes(b)
        );
      }

      if (source !== 'All') {
        list = list.filter(item => (item.source || '') === source);
      }

      if (q) {
        list = list.filter(item =>
          (item.name || '').toLowerCase().includes(q) ||
          (item.breed || '').toLowerCase().includes(q) ||
          (item.breed_secondary || '').toLowerCase().includes(q) ||
          (item.city || '').toLowerCase().includes(q) ||
          (item.source || '').toLowerCase().includes(q)
        );
      }

      if (sort === 'name') {
        list.sort((a, b) => (a.name || '').localeCompare(b.name || ''));
      } else if (sort === 'breed') {
        list.sort((a, b) => (a.breed || '').localeCompare(b.breed || ''));
      } else if (sort === 'source') {
        list.sort((a, b) => (a.source || '').localeCompare(b.source || ''));
      } else if (sort === 'price_low') {
        list.sort((a, b) => {
          const pa = priceToNumber(a.price);
          const pb = priceToNumber(b.price);
          return (pa ?? Number.MAX_SAFE_INTEGER) - (pb ?? Number.MAX_SAFE_INTEGER);
        });
      } else if (sort === 'price_high') {
        list.sort((a, b) => {
          const pa = priceToNumber(a.price);
          const pb = priceToNumber(b.price);
          return (pb ?? -1) - (pa ?? -1);
        });
      } else {
        list.sort((a, b) => (b.posted_at || '').localeCompare(a.posted_at || ''));
      }

      FILTERED_PUPPIES = list;
      renderCards(list);
      resultCountEl.textContent = `${list.length} result${list.length === 1 ? '' : 's'}`;
      renderViewTabs();
      saveUIState();
    }

    function renderCards(list) {
      if (!list.length) {
        if (CURRENT_VIEW === 'favorite') {
          showEmpty("No saved puppies yet", "Click Save on any puppy card and it will appear here.");
          return;
        }
        if (CURRENT_VIEW === 'hidden') {
          showEmpty("No hidden puppies", "Hidden puppies will appear here until you unhide them.");
          return;
        }
        showEmpty("No puppies found", "Try another breed, source, or search text.");
        return;
      }

      contentEl.innerHTML = `<div class="grid">${list.map(renderCard).join('')}</div>`;

      contentEl.querySelectorAll('[data-action="favorite"]').forEach(btn => {
        btn.addEventListener('click', () => {
          const id = btn.dataset.id;
          const current = getItemState(id).status;
          saveToState(id, current === 'favorite' ? 'none' : 'favorite', getItemState(id).note || '');
        });
      });

      contentEl.querySelectorAll('[data-action="hide"]').forEach(btn => {
        btn.addEventListener('click', () => {
          const id = btn.dataset.id;
          const current = getItemState(id).status;
          if (current === 'hidden') {
            saveToState(id, 'none', getItemState(id).note || '');
          } else {
            saveToState(id, 'hidden', getItemState(id).note || '');
          }
        });
      });

      contentEl.querySelectorAll('[data-action="note"]').forEach(btn => {
        btn.addEventListener('click', () => {
          const id = btn.dataset.id;
          const existing = getItemState(id).note || '';
          const note = prompt('Add or edit note:', existing);
          if (note === null) return;
          const currentStatus = getItemState(id).status;
          const nextStatus = currentStatus === 'new' ? 'favorite' : currentStatus;
          saveToState(id, nextStatus, note.trim());
        });
      });

      contentEl.querySelectorAll('[data-action="unhide"]').forEach(btn => {
        btn.addEventListener('click', () => {
          const id = btn.dataset.id;
          const note = getItemState(id).note || '';
          saveToState(id, 'none', note);
        });
      });
    }

    function renderCard(item) {
      const isFavorite = item.status === 'favorite';
      const isHidden = item.status === 'hidden';
      const img = item.photo_url ? escapeHtml(item.photo_url) : '';
      const openUrl = item.url ? escapeHtml(item.url) : '#';
      const price = item.price ? `<div class="price">${escapeHtml(item.price)}</div>` : '';
      const noteText = item.note ? escapeHtml(item.note) : '<span class="muted">No note yet.</span>';

      return `
        <div class="card">
          <div class="card-media">
            ${img
              ? `<img src="${img}" alt="${escapeHtml(item.name || 'Puppy')}" loading="lazy" onerror="this.style.display='none'; this.parentNode.style.background='#e5e7eb';">`
              : ``
            }
            <div class="card-badges">
              <div class="badge">${escapeHtml(item.source || 'Unknown')}</div>
              <div>
                ${isFavorite ? `<span class="badge favorite">Saved</span>` : ''}
                ${isHidden ? `<span class="badge hidden">Hidden</span>` : ''}
              </div>
            </div>
          </div>

          <div class="card-body">
            <div class="title-row">
              <div>
                <h3>${escapeHtml(item.name || 'Unnamed')}</h3>
              </div>
              ${price}
            </div>

            <div class="breed-line">${escapeHtml(item.breed || 'Unknown breed')}${item.breed_secondary ? ` / ${escapeHtml(item.breed_secondary)}` : ''}</div>

            <div class="meta">
              ${item.age_text ? `<span>${escapeHtml(item.age_text)}</span>` : ''}
              ${item.sex ? `<span>${escapeHtml(item.sex)}</span>` : ''}
              ${item.city || item.state ? `<span>${escapeHtml([item.city, item.state].filter(Boolean).join(', '))}</span>` : ''}
            </div>

            <div class="note-box">${noteText}</div>

            <div class="card-actions">
              <button class="btn ${isFavorite ? 'btn-success' : ''}" data-action="favorite" data-id="${escapeHtml(item.id)}">
                ${isFavorite ? 'Unsave' : 'Save'}
              </button>

              ${isHidden
                ? `<button class="btn" data-action="unhide" data-id="${escapeHtml(item.id)}">Unhide</button>`
                : `<button class="btn ${isHidden ? 'btn-danger' : ''}" data-action="hide" data-id="${escapeHtml(item.id)}">Hide</button>`
              }

              <button class="btn" data-action="note" data-id="${escapeHtml(item.id)}">Note</button>

              <a class="btn link-reset" href="${openUrl}" target="_blank" rel="noopener noreferrer">Open</a>
            </div>
          </div>
        </div>
      `;
    }

    function escapeHtml(value) {
      return String(value ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    async function fetchJSON(url, fallback = null) {
      try {
        const res = await fetch(url);
        if (!res.ok) throw new Error(`${url} -> ${res.status}`);
        return await res.json();
      } catch (e) {
        return fallback;
      }
    }

    async function initialLoad() {
      showLoading();
      statusMessageEl.textContent = 'Loading puppies...';

      restoreUIState();

      const [breedData, searchData, serverState, debugData] = await Promise.all([
        fetchJSON('/api/breeds', { breeds: BREEDS }),
        fetchJSON('/api/search?breed=All', { results: [] }),
        fetchJSON('/api/state', {}),
        fetchJSON('/api/debug', null)
      ]);

      BREEDS = breedData?.breeds?.length ? breedData.breeds : ['All'];
      ALL_PUPPIES = searchData?.results || [];

      const localState = loadLocalState();
      const mergedState = mergeStates(serverState || {}, localState || {});
      saveLocalState(mergedState);

      renderBreedButtons();

      if (debugData?.fp_cache_file?.exists) {
        cacheStatusEl.textContent =
          `954 cache: ${debugData.fp_cache_file.url_count || 0} URLs, ${debugData.fp_cache_file.age_hours || 0}h old`;
      } else {
        cacheStatusEl.textContent = '';
      }

      statusMessageEl.textContent = `Loaded ${ALL_PUPPIES.length} puppies`;
      applyFilters();
    }

    async function refreshAll() {
      refreshBtn.disabled = true;
      refreshBtn.textContent = 'Refreshing...';
      statusMessageEl.textContent = 'Refreshing puppies...';

      try {
        const searchData = await fetchJSON('/api/search?breed=All', { results: [] });
        ALL_PUPPIES = searchData?.results || [];

        const debugData = await fetchJSON('/api/debug', null);
        if (debugData?.fp_cache_file?.exists) {
          cacheStatusEl.textContent =
            `954 cache: ${debugData.fp_cache_file.url_count || 0} URLs, ${debugData.fp_cache_file.age_hours || 0}h old`;
        }

        statusMessageEl.textContent = `Loaded ${ALL_PUPPIES.length} puppies`;
        applyFilters();
      } finally {
        refreshBtn.disabled = false;
        refreshBtn.textContent = 'Refresh puppies';
      }
    }

    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        CURRENT_VIEW = btn.dataset.view;
        renderViewTabs();
        applyFilters();
      });
    });

    searchInput.addEventListener('input', applyFilters);
    sortSelect.addEventListener('change', applyFilters);
    sourceSelect.addEventListener('change', applyFilters);
    refreshBtn.addEventListener('click', refreshAll);

    initialLoad();
  </script>
</body>
</html>
