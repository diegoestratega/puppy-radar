<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Puppy Radar</title>
  <style>
    :root{
      --bg:#fffaf7;
      --panel:#ffffff;
      --panel-2:#fff3ee;
      --text:#2b2420;
      --muted:#7a6d66;
      --border:#ecd8cf;
      --primary:#d86f52;
      --primary-2:#b9563b;
      --accent:#f6cfc2;
      --success:#4e8d5b;
      --warning:#9a6b2f;
      --shadow:0 10px 30px rgba(64,32,16,.08);
      --radius:18px;
      --radius-sm:12px;
    }

    *{box-sizing:border-box}
    html,body{margin:0;padding:0}
    body{
      font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      background:linear-gradient(180deg,#fffaf7 0%,#fff6f2 100%);
      color:var(--text);
    }

    .wrap{
      max-width:1400px;
      margin:0 auto;
      padding:24px 16px 48px;
    }

    .hero{
      background:
        radial-gradient(circle at top right, #ffe4d8 0%, transparent 30%),
        radial-gradient(circle at bottom left, #ffeede 0%, transparent 28%),
        var(--panel);
      border:1px solid var(--border);
      border-radius:28px;
      box-shadow:var(--shadow);
      padding:24px;
      margin-bottom:18px;
    }

    .hero-top{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:16px;
      flex-wrap:wrap;
    }

    h1{
      margin:0;
      font-size:clamp(28px,4vw,44px);
      line-height:1.05;
      letter-spacing:-0.03em;
    }

    .subtitle{
      margin:8px 0 0;
      font-size:15px;
      color:var(--muted);
    }

    .hero-actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    .btn{
      border:none;
      border-radius:999px;
      padding:10px 14px;
      font-weight:600;
      cursor:pointer;
      transition:.18s ease;
    }

    .btn:hover{transform:translateY(-1px)}
    .btn-primary{
      background:var(--primary);
      color:#fff;
    }
    .btn-primary:hover{background:var(--primary-2)}
    .btn-soft{
      background:#fff;
      color:var(--text);
      border:1px solid var(--border);
    }
    .btn-soft.active{
      background:var(--accent);
      border-color:#e7b2a2;
    }
    .btn-danger{
      background:#fff;
      color:#8c4a39;
      border:1px solid #efc1b3;
    }

    .controls{
      display:grid;
      grid-template-columns:1fr;
      gap:14px;
      margin-top:18px;
    }

    .toolbar{
      background:var(--panel);
      border:1px solid var(--border);
      border-radius:20px;
      box-shadow:var(--shadow);
      padding:14px;
    }

    .toolbar-row{
      display:flex;
      gap:12px;
      flex-wrap:wrap;
      align-items:center;
    }

    .search{
      flex:1 1 260px;
      min-width:220px;
      background:#fff;
      border:1px solid var(--border);
      border-radius:999px;
      padding:12px 14px;
      font-size:14px;
      color:var(--text);
      outline:none;
    }

    .select{
      background:#fff;
      border:1px solid var(--border);
      border-radius:999px;
      padding:12px 14px;
      font-size:14px;
      color:var(--text);
      outline:none;
      min-width:140px;
    }

    .tabs{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:12px;
    }

    .tab{
      background:#fff;
      border:1px solid var(--border);
      color:var(--text);
      border-radius:999px;
      padding:10px 14px;
      cursor:pointer;
      font-weight:600;
    }
    .tab.active{
      background:var(--accent);
      border-color:#e7b2a2;
    }

    .breed-bar{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:14px;
    }

    .breed-btn{
      background:#fff;
      border:1px solid var(--border);
      color:var(--text);
      border-radius:999px;
      padding:9px 13px;
      cursor:pointer;
      font-size:14px;
      font-weight:600;
    }
    .breed-btn.active{
      background:var(--primary);
      color:#fff;
      border-color:var(--primary);
    }

    .status-bar{
      display:flex;
      justify-content:space-between;
      gap:12px;
      align-items:center;
      flex-wrap:wrap;
      margin:18px 0 12px;
      color:var(--muted);
      font-size:14px;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(290px,1fr));
      gap:18px;
    }

    .card{
      background:var(--panel);
      border:1px solid var(--border);
      border-radius:22px;
      box-shadow:var(--shadow);
      overflow:hidden;
      display:flex;
      flex-direction:column;
      min-height:100%;
    }

    .media{
      aspect-ratio: 4 / 3;
      background:#f7ebe6;
      overflow:hidden;
    }

    .media img{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
    }

    .media-placeholder{
      width:100%;
      height:100%;
      display:flex;
      align-items:center;
      justify-content:center;
      color:#b48d7d;
      font-size:14px;
      background:linear-gradient(135deg,#fff0e6,#f9e2d8);
    }

    .content{
      padding:16px;
      display:flex;
      flex-direction:column;
      gap:10px;
      flex:1;
    }

    .title-row{
      display:flex;
      justify-content:space-between;
      gap:10px;
      align-items:flex-start;
    }

    .name{
      margin:0;
      font-size:22px;
      line-height:1.1;
      letter-spacing:-0.02em;
    }

    .source-badge{
      white-space:nowrap;
      font-size:12px;
      font-weight:700;
      background:#fff1ea;
      color:#8f4c38;
      border:1px solid #f0c9bb;
      padding:6px 9px;
      border-radius:999px;
    }

    .chips{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
    }

    .chip{
      font-size:12px;
      font-weight:700;
      background:#fff;
      border:1px solid var(--border);
      color:#665a53;
      padding:6px 9px;
      border-radius:999px;
    }

    .details{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:8px 12px;
      font-size:14px;
    }

    .detail{
      color:var(--muted);
    }

    .detail strong{
      display:block;
      color:var(--text);
      font-size:12px;
      text-transform:uppercase;
      letter-spacing:.04em;
      margin-bottom:2px;
    }

    .note-box{
      background:var(--panel-2);
      border:1px dashed #e6b9a9;
      border-radius:14px;
      padding:10px 12px;
      font-size:13px;
      color:#6f5e57;
    }

    .actions{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      margin-top:auto;
      padding-top:4px;
    }

    .card-btn{
      flex:1 1 120px;
      border:none;
      border-radius:12px;
      padding:11px 12px;
      cursor:pointer;
      font-weight:700;
      font-size:14px;
    }

    .save-btn{background:#ffe6d9;color:#8f4c38}
    .save-btn.active{background:#ffcfba;color:#7d3928}
    .hide-btn{background:#f5f0ed;color:#5f5550}
    .note-btn{background:#fff3d9;color:#7c6226}
    .open-btn{
      background:var(--primary);
      color:#fff;
      text-decoration:none;
      text-align:center;
      display:inline-flex;
      align-items:center;
      justify-content:center;
    }

    .empty{
      background:var(--panel);
      border:1px solid var(--border);
      border-radius:22px;
      box-shadow:var(--shadow);
      padding:34px 20px;
      text-align:center;
      color:var(--muted);
    }

    .loading{
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(290px,1fr));
      gap:18px;
    }

    .skeleton{
      background:var(--panel);
      border:1px solid var(--border);
      border-radius:22px;
      overflow:hidden;
      box-shadow:var(--shadow);
    }

    .sk-media,.sk-line{
      background:linear-gradient(90deg,#f5ebe6 25%,#fff5f0 50%,#f5ebe6 75%);
      background-size:200% 100%;
      animation:shimmer 1.2s infinite linear;
    }

    .sk-media{aspect-ratio:4/3}
    .sk-body{padding:16px}
    .sk-line{height:14px;border-radius:999px;margin-bottom:10px}
    .sk-line.lg{height:22px;width:60%}
    .sk-line.md{width:90%}
    .sk-line.sm{width:45%}

    @keyframes shimmer{
      0%{background-position:200% 0}
      100%{background-position:-200% 0}
    }

    .footer-note{
      margin-top:18px;
      color:var(--muted);
      font-size:13px;
      text-align:center;
    }

    @media (max-width:700px){
      .hero{padding:18px}
      .toolbar{padding:12px}
      .details{grid-template-columns:1fr 1fr}
      .card-btn{flex:1 1 100%}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <div class="hero-top">
        <div>
          <h1>Puppy Radar</h1>
          <p class="subtitle">A custom puppy finder for Abby — cute, small, low-shed puppies.</p>
        </div>

        <div class="hero-actions">
          <button id="exportBtn" class="btn btn-soft" type="button">Export Abby's Saves</button>
          <button id="importBtn" class="btn btn-soft" type="button">Import Abby's Saves</button>
          <input id="importFile" type="file" accept="application/json" style="display:none">
        </div>
      </div>

      <div class="controls">
        <div class="toolbar">
          <div class="toolbar-row">
            <input id="searchInput" class="search" type="text" placeholder="Search name, breed, source..." />
            <select id="sortSelect" class="select">
              <option value="newest">Sort: Newest</option>
              <option value="name">Sort: Name</option>
              <option value="breed">Sort: Breed</option>
              <option value="source">Sort: Source</option>
            </select>
          </div>

          <div class="tabs">
            <button class="tab active" data-view="all">All Puppies</button>
            <button class="tab" data-view="favorites">Abby's Saves</button>
            <button class="tab" data-view="hidden">Hidden</button>
          </div>

          <div id="breedBar" class="breed-bar"></div>
        </div>
      </div>
    </section>

    <div class="status-bar">
      <div id="statusText">Loading puppies...</div>
      <div id="countText"></div>
    </div>

    <div id="loadingView" class="loading"></div>
    <div id="results" class="grid" style="display:none"></div>

    <p class="footer-note">
      Saves, notes, and hidden items stay on this browser/device unless browser data is cleared.
    </p>
  </div>

  <script>
    const LS_KEY = "puppy_radar_state_v2";
    let ALL_PUPPIES = [];
    let CURRENT_VIEW = "all";     // all | favorites | hidden
    let CURRENT_BREED = "All";
    let CURRENT_SEARCH = "";
    let CURRENT_SORT = "newest";
    let AVAILABLE_BREEDS = [];

    const resultsEl    = document.getElementById("results");
    const loadingView  = document.getElementById("loadingView");
    const statusText   = document.getElementById("statusText");
    const countText    = document.getElementById("countText");
    const breedBar     = document.getElementById("breedBar");
    const searchInput  = document.getElementById("searchInput");
    const sortSelect   = document.getElementById("sortSelect");
    const exportBtn    = document.getElementById("exportBtn");
    const importBtn    = document.getElementById("importBtn");
    const importFile   = document.getElementById("importFile");

    function loadLocalState() {
      try {
        return JSON.parse(localStorage.getItem(LS_KEY) || "{}");
      } catch {
        return {};
      }
    }

    function saveLocalState(state) {
      localStorage.setItem(LS_KEY, JSON.stringify(state));
    }

    function getItemState(id) {
      const state = loadLocalState();
      return state[id] || { status: "new", note: "" };
    }

    function setItemState(id, status, note = null) {
      const state = loadLocalState();
      const current = state[id] || { status: "new", note: "" };

      if (status === "none") {
        if (current.note && current.note.trim()) {
          state[id] = {
            status: "new",
            note: current.note,
            updated_at: new Date().toISOString()
          };
        } else {
          delete state[id];
        }
      } else {
        state[id] = {
          status,
          note: note !== null ? note : (current.note || ""),
          updated_at: new Date().toISOString()
        };
      }

      saveLocalState(state);
    }

    function setItemNote(id, note) {
      const state = loadLocalState();
      const current = state[id] || { status: "new", note: "" };

      if (!note || !note.trim()) {
        if (current.status === "new") {
          delete state[id];
        } else {
          state[id] = {
            status: current.status,
            note: "",
            updated_at: new Date().toISOString()
          };
        }
      } else {
        state[id] = {
          status: current.status || "new",
          note: note.trim(),
          updated_at: new Date().toISOString()
        };
      }

      saveLocalState(state);
    }

    function favoriteCount() {
      const state = loadLocalState();
      return Object.values(state).filter(x => x.status === "favorite").length;
    }

    function hiddenCount() {
      const state = loadLocalState();
      return Object.values(state).filter(x => x.status === "hidden").length;
    }

    function showLoading() {
      loadingView.style.display = "grid";
      resultsEl.style.display = "none";
      loadingView.innerHTML = "";
      for (let i = 0; i < 8; i++) {
        loadingView.innerHTML += `
          <div class="skeleton">
            <div class="sk-media"></div>
            <div class="sk-body">
              <div class="sk-line lg"></div>
              <div class="sk-line md"></div>
              <div class="sk-line sm"></div>
              <div class="sk-line md"></div>
              <div class="sk-line md"></div>
            </div>
          </div>
        `;
      }
    }

    function escapeHtml(str = "") {
      return String(str)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function buildBreedButtons() {
      breedBar.innerHTML = "";
      AVAILABLE_BREEDS.forEach(breed => {
        const btn = document.createElement("button");
        btn.className = "breed-btn" + (breed === CURRENT_BREED ? " active" : "");
        btn.dataset.breed = breed;
        btn.textContent = breed;
        btn.addEventListener("click", () => {
          CURRENT_BREED = breed;
          updateBreedButtons();
          renderFiltered();
        });
        breedBar.appendChild(btn);
      });
    }

    function updateBreedButtons() {
      document.querySelectorAll(".breed-btn").forEach(btn => {
        btn.classList.toggle("active", btn.dataset.breed === CURRENT_BREED);
      });
    }

    function updateTabs() {
      document.querySelectorAll(".tab").forEach(tab => {
        tab.classList.toggle("active", tab.dataset.view === CURRENT_VIEW);
      });
    }

    function matchesBreedFilter(item, breed) {
      if (breed === "All") return true;
      const b = breed.toLowerCase();
      return (
        (item.breed || "").toLowerCase().includes(b) ||
        (item.breed_secondary || "").toLowerCase().includes(b) ||
        (item.name || "").toLowerCase().includes(b)
      );
    }

    function matchesSearch(item, q) {
      if (!q) return true;
      const t = q.toLowerCase();
      return [
        item.name,
        item.breed,
        item.breed_secondary,
        item.source,
        item.city,
        item.state,
        item.age_text,
        item.sex,
        item.price,
      ].some(v => (v || "").toLowerCase().includes(t));
    }

    function enrichWithState(item) {
      const s = getItemState(item.id);
      return {
        ...item,
        local_status: s.status || "new",
        local_note: s.note || ""
      };
    }

    function sortItems(items) {
      const arr = [...items];

      if (CURRENT_SORT === "name") {
        arr.sort((a, b) => (a.name || "").localeCompare(b.name || ""));
      } else if (CURRENT_SORT === "breed") {
        arr.sort((a, b) => (a.breed || "").localeCompare(b.breed || ""));
      } else if (CURRENT_SORT === "source") {
        arr.sort((a, b) => (a.source || "").localeCompare(b.source || ""));
      } else {
        arr.sort((a, b) => {
          const da = a.posted_at ? new Date(a.posted_at).getTime() : 0;
          const db = b.posted_at ? new Date(b.posted_at).getTime() : 0;
          return db - da;
        });
      }

      return arr;
    }

    function filteredItems() {
      let items = ALL_PUPPIES.map(enrichWithState);

      items = items.filter(item => matchesBreedFilter(item, CURRENT_BREED));
      items = items.filter(item => matchesSearch(item, CURRENT_SEARCH));

      if (CURRENT_VIEW === "favorites") {
        items = items.filter(item => item.local_status === "favorite");
      } else if (CURRENT_VIEW === "hidden") {
        items = items.filter(item => item.local_status === "hidden");
      } else {
        items = items.filter(item => item.local_status !== "hidden");
      }

      return sortItems(items);
    }

    function renderFiltered() {
      const items = filteredItems();

      loadingView.style.display = "none";
      resultsEl.style.display = "grid";

      const favCount = favoriteCount();
      const hidCount = hiddenCount();

      if (CURRENT_VIEW === "favorites") {
        statusText.textContent = `Showing Abby's Saves • ${favCount} saved`;
      } else if (CURRENT_VIEW === "hidden") {
        statusText.textContent = `Showing hidden puppies • ${hidCount} hidden`;
      } else {
        statusText.textContent = `Loaded once • now filtering instantly on this page`;
      }

      countText.textContent = `${items.length} result${items.length === 1 ? "" : "s"}`;

      if (!items.length) {
        resultsEl.innerHTML = `
          <div class="empty" style="grid-column:1/-1">
            <h3 style="margin:0 0 8px;">No puppies match this filter</h3>
            <p style="margin:0;">Try a different breed, clear the search, or switch tabs.</p>
          </div>
        `;
        return;
      }

      resultsEl.innerHTML = items.map(item => {
        const isSaved  = item.local_status === "favorite";
        const isHidden = item.local_status === "hidden";

        const photoHtml = item.photo_url
          ? `<img src="${escapeHtml(item.photo_url)}" alt="${escapeHtml(item.name || "Puppy")}" loading="lazy" onerror="this.outerHTML='<div class=&quot;media-placeholder&quot;>No photo</div>'">`
          : `<div class="media-placeholder">No photo</div>`;

        return `
          <article class="card">
            <div class="media">${photoHtml}</div>
            <div class="content">
              <div class="title-row">
                <div>
                  <h2 class="name">${escapeHtml(item.name || "Unknown")}</h2>
                </div>
                <div class="source-badge">${escapeHtml(item.source || "Unknown")}</div>
              </div>

              <div class="chips">
                ${item.breed ? `<span class="chip">${escapeHtml(item.breed)}</span>` : ""}
                ${item.breed_secondary ? `<span class="chip">${escapeHtml(item.breed_secondary)}</span>` : ""}
                ${item.price ? `<span class="chip">${escapeHtml(item.price)}</span>` : ""}
                ${isSaved ? `<span class="chip" style="background:#ffe1d3;color:#8f3f2c;border-color:#efbaa8">Saved for Abby</span>` : ""}
                ${isHidden ? `<span class="chip" style="background:#f0ece9;color:#635a54">Hidden</span>` : ""}
              </div>

              <div class="details">
                <div class="detail"><strong>Age</strong>${escapeHtml(item.age_text || item.age_group || "—")}</div>
                <div class="detail"><strong>Sex</strong>${escapeHtml(item.sex || "—")}</div>
                <div class="detail"><strong>Location</strong>${escapeHtml([item.city, item.state].filter(Boolean).join(", ") || "—")}</div>
                <div class="detail"><strong>Source</strong>${escapeHtml(item.source || "—")}</div>
              </div>

              ${item.local_note ? `<div class="note-box"><strong>Abby's note:</strong><br>${escapeHtml(item.local_note)}</div>` : ""}

              <div class="actions">
                <button class="card-btn save-btn ${isSaved ? "active" : ""}" onclick="toggleSave('${escapeHtml(item.id)}')">
                  ${isSaved ? "Remove Save" : "Save for Abby"}
                </button>

                <button class="card-btn note-btn" onclick="editNote('${escapeHtml(item.id)}')">
                  ${item.local_note ? "Edit Note" : "Add Note"}
                </button>

                <button class="card-btn hide-btn" onclick="toggleHidden('${escapeHtml(item.id)}')">
                  ${isHidden ? "Unhide" : "Hide"}
                </button>

                <a class="card-btn open-btn" href="${escapeHtml(item.url || "#")}" target="_blank" rel="noopener noreferrer">
                  Open Listing
                </a>
              </div>
            </div>
          </article>
        `;
      }).join("");
    }

    async function loadBreeds() {
      try {
        const res = await fetch("/api/breeds");
        const data = await res.json();
        const incoming = Array.isArray(data.breeds) ? data.breeds : [];
        AVAILABLE_BREEDS = incoming.length ? incoming : ["All"];
      } catch {
        AVAILABLE_BREEDS = [
          "All", "Poodle", "Maltese", "Shih Tzu", "Yorkshire Terrier",
          "Bichon Frise", "Havanese", "Miniature Schnauzer", "Maltipoo",
          "Cavapoo", "Morkie", "Shihpoo", "Cockapoo", "Teddy Bear"
        ];
      }
      buildBreedButtons();
    }

    async function loadAllPuppiesOnce() {
      showLoading();
      try {
        const res = await fetch("/api/search?breed=All");
        const data = await res.json();
        ALL_PUPPIES = Array.isArray(data.results) ? data.results : [];
        renderFiltered();
      } catch (err) {
        loadingView.style.display = "none";
        resultsEl.style.display = "grid";
        resultsEl.innerHTML = `
          <div class="empty" style="grid-column:1/-1">
            <h3 style="margin:0 0 8px;">Could not load puppies</h3>
            <p style="margin:0;">Refresh the page and try again.</p>
          </div>
        `;
        statusText.textContent = "Load failed";
        countText.textContent = "";
      }
    }

    function toggleSave(id) {
      const current = getItemState(id);
      if (current.status === "favorite") {
        setItemState(id, "none");
      } else {
        setItemState(id, "favorite");
      }
      renderFiltered();
    }

    function toggleHidden(id) {
      const current = getItemState(id);
      if (current.status === "hidden") {
        setItemState(id, "none");
      } else {
        setItemState(id, "hidden");
      }
      renderFiltered();
    }

    function editNote(id) {
      const current = getItemState(id);
      const next = prompt("Add or edit Abby's note:", current.note || "");
      if (next === null) return;
      setItemNote(id, next);
      renderFiltered();
    }

    function exportSaves() {
      const state = loadLocalState();
      const blob = new Blob([JSON.stringify(state, null, 2)], { type: "application/json" });
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = "abby-saves-backup.json";
      a.click();
      URL.revokeObjectURL(a.href);
    }

    function importSavesFromFile(file) {
      const reader = new FileReader();
      reader.onload = () => {
        try {
          const data = JSON.parse(reader.result);
          if (!data || typeof data !== "object") throw new Error("Invalid file");
          localStorage.setItem(LS_KEY, JSON.stringify(data));
          renderFiltered();
          alert("Abby's Saves imported.");
        } catch {
          alert("That file is not a valid Abby's Saves backup.");
        }
      };
      reader.readAsText(file);
    }

    document.querySelectorAll(".tab").forEach(tab => {
      tab.addEventListener("click", () => {
        CURRENT_VIEW = tab.dataset.view;
        updateTabs();
        renderFiltered();
      });
    });

    searchInput.addEventListener("input", e => {
      CURRENT_SEARCH = e.target.value.trim();
      renderFiltered();
    });

    sortSelect.addEventListener("change", e => {
      CURRENT_SORT = e.target.value;
      renderFiltered();
    });

    exportBtn.addEventListener("click", exportSaves);
    importBtn.addEventListener("click", () => importFile.click());
    importFile.addEventListener("change", e => {
      const file = e.target.files?.[0];
      if (file) importSavesFromFile(file);
      e.target.value = "";
    });

    window.addEventListener("storage", e => {
      if (e.key === LS_KEY) renderFiltered();
    });

    window.toggleSave = toggleSave;
    window.toggleHidden = toggleHidden;
    window.editNote = editNote;

    (async function init() {
      await loadBreeds();
      await loadAllPuppiesOnce();
    })();
  </script>
</body>
</html>
